spring:
  application:
    name: realtime-sujeong-collector

server:
  port: 8083

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      batch-size: 16384
      linger-ms: 5
      buffer-memory: 33554432
      properties:
        spring.json.add.type.headers: false

logging:
  level:
    com.javacafe.realtime_sujeong.collector.crawlerhtml.NaverRssNewsService: DEBUG
    root: INFO

# MinIO 설정
minio:
  endpoint: http://localhost:9000
  access-key: admin
  secret-key: admin123
  bucket:
    wikimedia: wikimedia-dumps
    naver-news: naver-news-data

# Kafka 토픽 설정
kafka:
  topics:
    raw-data: raw-data-topic
    news-data: news-data-topic
    social-data: social-data-topic
    wiki-data: wiki-data-topic

# Wikimedia 설정
wikimedia:
  download-dir: ./data/wikimedia
  dump-url: https://dumps.wikimedia.org/kowiki/latest/kowiki-latest-pages-articles.xml.bz2