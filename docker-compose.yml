services:
  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.2.0
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    platform: linux/amd64

  # Kafka Broker - 더 안정적인 구버전 사용
  kafka:
    image: confluentinc/cp-kafka:7.2.0
    hostname: kafka
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    platform: linux/amd64

  # Kafka UI - ARM64 지원 버전
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    platform: linux/amd64

  # Elasticsearch - 검색 엔진
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    platform: linux/amd64

  # Kibana - Elasticsearch GUI
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    platform: linux/amd64

  # Redis - 캐시 서버
  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    platform: linux/amd64

  # NER Server - 한국어 개체명 인식 gRPC 서버
  ner-server:
    build: ./ner-server
    container_name: ner-server
    ports:
      - "50051:50051"  # gRPC 포트
    environment:
      - MODEL_NAME=monologg/koelectra-base-v3-naver-ner
      - DEVICE=cpu
      - GRPC_PORT=50051
      - GRPC_HOST=0.0.0.0
      - MAX_WORKERS=10
      - MAX_TEXT_LENGTH=10000
      - MAX_BATCH_SIZE=100
      - CONFIDENCE_THRESHOLD=0.8
      - LOG_LEVEL=INFO
      - TORCH_NUM_THREADS=4
    volumes:
      - ner-model-cache:/root/.cache/huggingface  # 모델 캐시 볼륨
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50051"]
      interval: 30s
      timeout: 10s
      start_period: 60s  # 모델 로딩 시간 고려
      retries: 3
    platform: linux/amd64

volumes:
  ner-model-cache:
    driver: local
  elasticsearch-data:
    driver: local
  redis-data:
    driver: local