# Application Name
spring.application.name=collection-system

# Active Profile
spring.profiles.active=dev

# Server Port
server.port=8081

# MongoDB 설정
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/realtime_sujeong}
spring.data.mongodb.database=${MONGODB_DATABASE:realtime_sujeong}

# Kafka Producer 설정
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Wiki Dump 파일 경로
# 전체 파일 (877만 라인): reference/wiki/wikidatawiki-multistream1.xml-p1p441397
# 테스트용 샘플 (1000 페이지): reference/wiki/wiki-sample-1000.xml
wiki.dump.file.path=reference/wiki/wiki-sample-1000.xml

# Wiki Batch 설정
wiki.batch.chunk-size=500

# Spring Batch 설정
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

# H2 Database (for Spring Batch metadata)
spring.datasource.url=jdbc:h2:mem:batch
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Logging
logging.level.javacafe.realtime_sujeong=INFO
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.org.apache.kafka=INFO
logging.level.org.springframework.batch=DEBUG