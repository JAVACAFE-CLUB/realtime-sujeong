# Test Profile Configuration

# MongoDB (Embedded MongoDB will override this)
spring.data.mongodb.uri=mongodb://localhost:27017/test_db

# Elasticsearch (Testcontainers will override this)
spring.elasticsearch.uris=http://localhost:9200

# Redis (Embedded Redis will override this)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Kafka (Embedded Kafka will override this)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=indexing-test-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# Kafka Topics
kafka.topics.cleaning-to-indexing=test-cleaning-to-indexing
kafka.topics.dead-letter-queue=test-dead-letter-queue

# NER Server (Mock을 사용하므로 실제 서버 불필요)
ner.server.host=localhost
ner.server.port=50051
ner.server.deadline-seconds=10
ner.confidence-threshold=0.5

# Keyword Scoring Configuration
keyword.scoring.title-weight=2.0
keyword.scoring.content-weight=1.0

# Entity Type Weights
keyword.scoring.entity-weight.org=1.5
keyword.scoring.entity-weight.per=1.3
keyword.scoring.entity-weight.af=1.2
keyword.scoring.entity-weight.loc=1.0

# Redis Cache Configuration
redis.cache.ttl.daily-keywords=3600
redis.cache.prefix.daily-top-keywords=test_daily_top_keywords

# Logging
logging.level.javacafe.realtime_sujeong.indexing=DEBUG
logging.level.org.springframework.data.elasticsearch=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
