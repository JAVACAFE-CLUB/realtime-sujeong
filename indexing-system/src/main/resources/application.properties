# Application Name
spring.application.name=indexing-system

# Active Profile
spring.profiles.active=dev

# Server Port
server.port=8083

# MongoDB 설정
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/realtime_sujeong}
spring.data.mongodb.database=${MONGODB_DATABASE:realtime_sujeong}

# Elasticsearch Configuration
spring.elasticsearch.uris=${ELASTICSEARCH_URI:http://localhost:9200}
spring.elasticsearch.connection-timeout=10s
spring.elasticsearch.socket-timeout=60s

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# Kafka Consumer Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=indexing-system-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.max-poll-records=100

# Kafka Topics
kafka.topics.cleaning-to-indexing=cleaning-to-indexing
kafka.topics.dead-letter-queue=dead-letter-queue

# NER Server Configuration (gRPC)
ner.server.host=${NER_SERVER_HOST:localhost}
ner.server.port=${NER_SERVER_PORT:50051}
ner.server.deadline-seconds=30
ner.confidence.threshold=0.8

# Elasticsearch Index Configuration
elasticsearch.index.keyword=keyword_index
elasticsearch.index.number-of-shards=3
elasticsearch.index.number-of-replicas=1

# Redis Cache Configuration
redis.cache.ttl.daily-keywords=90000
redis.cache.prefix.daily-top-keywords=daily_top_keywords

# Keyword Scoring Configuration
keyword.scoring.title-weight=2.0
keyword.scoring.content-weight=1.0
keyword.scoring.entity-weight.org=1.5
keyword.scoring.entity-weight.per=1.3
keyword.scoring.entity-weight.loc=1.0
keyword.scoring.entity-weight.af=1.2
keyword.scoring.entity-weight.default=1.0

# Batch Processing Configuration
indexing.batch.size=100
indexing.batch.flush-interval=5000

# Logging Configuration
logging.level.root=INFO
logging.level.javacafe.realtime_sujeong.indexing=DEBUG
logging.level.org.springframework.data.elasticsearch=DEBUG
logging.level.org.springframework.kafka=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n